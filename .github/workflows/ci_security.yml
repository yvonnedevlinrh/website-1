---
name: Security Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: none
  id-token: none
  security-events: none
  packages: none

jobs:
  call_reusable_vuln_scan:
    name: OSV-Scanner
    permissions:
      contents: read
      actions: read
      security-events: write
      id-token: write
      packages: write
    uses: complytime/org-infra/.github/workflows/reusable_vuln_scan.yml@32b8e9b381a33fc4c3f8768856b11d94655f20c4 # main

  call_reusable_security:
    name: OpenSSF Scorecards
    permissions:
      contents: read
      id-token: write
      security-events: write
    uses: complytime/org-infra/.github/workflows/reusable_security.yml@32b8e9b381a33fc4c3f8768856b11d94655f20c4 # main
